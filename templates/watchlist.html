{% extends "base.html" %} 
{% block content %}
<section>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold border-l-4 border-red-600 pl-4">
       My Watchlist
    </h1>
    
    <button
      id="clearBtn"
      onclick="clearWatchlist()"
      class="hidden text-xs text-gray-500 hover:text-red-500 transition flex items-center gap-1"
    >
      <ion-icon name="trash-outline"></ion-icon> Clear All Data
    </button>
  </div>

  <div
    id="watchlistGrid"
    class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"
  ></div>

  <div
    id="emptyState"
    class="hidden flex flex-col items-center justify-center py-20 text-center"
  >
    <ion-icon
      name="bookmark-outline"
      class="text-6xl text-gray-700 mb-4"
    ></ion-icon>
    <h2 class="text-xl font-bold text-gray-400">
      Your watchlist is currently empty.
    </h2>
    <a href="/" class="mt-4 text-red-500 hover:underline"
      >Go find some movies</a
    >
  </div>
</section>

<script>
  const watchlist = JSON.parse(localStorage.getItem("codeje_watchlist") || "[]");
  const grid = document.getElementById("watchlistGrid");
  const empty = document.getElementById("emptyState");
  const clearBtn = document.getElementById("clearBtn");

  function clearWatchlist() {
    if(confirm("Are you sure you want to delete your entire watchlist?")) {
        localStorage.removeItem('codeje_watchlist');
        location.reload();
    }
  }

  if (watchlist.length === 0) {
    empty.classList.remove("hidden");
  } else {
    // Show the clear button if there are items
    clearBtn.classList.remove("hidden");
    
    watchlist.forEach((movie) => {
      const card = `
                <a href="/movie/${movie.id}" class="group bg-gray-900 rounded-xl overflow-hidden border border-gray-800 transition-transform hover:scale-105">
                    <div class="aspect-[2/3] relative">
                        <img src="https://image.tmdb.org/t/p/w500${movie.poster}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-yellow-500 text-xs font-bold">
                            ★ ${movie.rating}
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-sm font-bold text-white truncate">${movie.title}</h3>
                        <p class="text-xs text-red-500 mt-1 font-mono">ID: ${movie.id}</p>
                    </div>
                </a>
            `;
      grid.innerHTML += card;
    });
  }
</script>
{% endblock %}

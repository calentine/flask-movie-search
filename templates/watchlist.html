{% extends "base.html" %}
{% from "components/_movie_cards.html" import movie_card %}
 
{% block content %}
<section>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold border-l-4 border-red-600 pl-4">My Watchlist</h1>
    <button id="clearBtn" onclick="clearWatchlist()" class="hidden text-xs text-gray-500 hover:text-red-500 transition flex items-center gap-1">
      <ion-icon name="trash-outline"></ion-icon> Clear All Data
    </button>
  </div>

  <div id="watchlistGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>

  <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
    <ion-icon name="bookmark-outline" class="text-6xl text-gray-700 mb-4"></ion-icon>
    <h2 class="text-xl font-bold text-gray-400">Your watchlist is currently empty.</h2>
    <a href="/" class="mt-4 text-red-500 hover:underline">Click here to browse movies</a>
  </div>
</section>

<template id="card-template">
    {{ movie_card({'id': 'ID_VAL', 'title': 'TITLE_VAL', 'poster_path': 'POSTER_VAL', 'vote_average': 'VOTE_VAL', 'release_date': 'DATE_VAL'}) }}
</template>

<script>
  const watchlist = JSON.parse(localStorage.getItem("codeje_watchlist") || "[]");
  const grid = document.getElementById("watchlistGrid");
  const empty = document.getElementById("emptyState");
  const clearBtn = document.getElementById("clearBtn");
  const templateHtml = document.getElementById("card-template").innerHTML;

  function clearWatchlist() {
    if(confirm("Delete entire watchlist?")) {
        localStorage.removeItem('codeje_watchlist');
        location.reload();
    }
  }

  if (watchlist.length === 0) {
    empty.classList.remove("hidden");
  } else {
    clearBtn.classList.remove("hidden");
    watchlist.forEach(movie => {
      // 1. Perform the replacement into the template
      let html = templateHtml
        .replace(/ID_VAL/g, movie.id)
        .replace(/TITLE_VAL/g, movie.title)
        // Ensure the path is correct even if movie.poster already has a slash
        .replace(/POSTER_VAL/g, movie.poster ? `https://image.tmdb.org/t/p/w500${movie.poster}` : '')
        .replace(/VOTE_VAL/g, movie.rating || movie.vote_average || '0')
        .replace(/DATE_VAL/g, movie.release_date || 'N/A');
        
      grid.innerHTML += html;
    });
  }
</script>
{% endblock %}

{% extends "base.html" %} 
{% from "components/_movie_cards.html" import movie_card %}

{% block content %}
<section>
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold border-l-4 border-red-600 pl-4">Already Watched Movies</h1>
    <button id="clearBtn" onclick="clearWatched()" class="hidden text-xs text-gray-500 hover:text-red-500 transition flex items-center gap-1">
      <ion-icon name="trash-outline"></ion-icon> Clear All Data
    </button>
  </div>

  <div id="watchedGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>

  <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
    <ion-icon name="checkmark-circle-outline" class="text-6xl text-gray-700 mb-4"></ion-icon>
    <h2 class="text-xl font-bold text-gray-400">You haven't marked any movies as watched yet.</h2>
    <a href="/" class="mt-4 text-red-500 hover:underline">Click here to browse movies</a>
  </div>
</section>

<template id="card-template">
    {{ movie_card({'id': 'ID_VAL', 'title': 'TITLE_VAL', 'poster_path': 'POSTER_VAL', 'vote_average': 'VOTE_VAL', 'release_date': 'DATE_VAL'}) }}
</template>
{% endblock %}

{% block scripts %}
<script>
    // Just call the global function with your specific IDs
    const template = document.getElementById("card-template").innerHTML;
    
    renderStoredMovieGrid(
        "codeje_watched", 
        "watchedGrid", 
        "emptyState", 
        "clearBtn", 
        template
    );

    function clearWatched() {
        clearStorageList("codeje_watched");
    }
</script>
{% endblock %}
